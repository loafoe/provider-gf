# Example RuleGroup resource
# This creates an alert rule group in Grafana with one or more alert rules
---
apiVersion: alerting.gf.m.crossplane.io/v1alpha1
kind: RuleGroup
metadata:
  name: example-rulegroup
  namespace: default
spec:
  providerConfigRef:
    name: grafana-config
    kind: ProviderConfig
  forProvider:
    name: example-alerts
    # Reference a folder by name (requires a Folder resource)
    folderRef:
      name: alerts-folder
    # Alternatively, use a direct folder UID:
    # folderUid: "abc123"
    # Evaluation interval in seconds (minimum 10)
    intervalSeconds: 60
    # Allow editing in Grafana UI
    disableProvenance: true
    rules:
      # Simple expression-based alert for testing
      - title: Test Alert - Always Firing
        # The refId of the query/expression that is the alert condition
        condition: B
        # Duration before the alert fires
        for: "1m"
        # What to do when query returns no data: NoData, Alerting, OK
        noDataState: "NoData"
        # What to do on execution error: Error, Alerting, OK
        execErrState: "Error"
        # Labels for routing and grouping
        labels:
          severity: info
          team: platform
          source: crossplane
        # Annotations shown in alert notifications
        annotations:
          summary: "Test alert from Crossplane"
          description: "This is a test alert that is always firing"
        # Data queries and expressions
        data:
          # A: Math expression that always returns 1
          - refId: A
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expression: "1"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
              type: math
          # B: Threshold that fires when A > 0
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expression: "$A > 0"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: threshold

# Example with Prometheus query
---
apiVersion: alerting.gf.m.crossplane.io/v1alpha1
kind: RuleGroup
metadata:
  name: cpu-alerts
  namespace: default
spec:
  providerConfigRef:
    name: grafana-config
    kind: ProviderConfig
  forProvider:
    name: cpu-monitoring
    folderRef:
      name: alerts-folder
    intervalSeconds: 60
    rules:
      - title: High CPU Usage
        condition: C
        for: "5m"
        noDataState: "NoData"
        execErrState: "Error"
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage has been above 80% for 5 minutes"
        data:
          # A: Prometheus query for CPU usage
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: "avg(rate(node_cpu_seconds_total{mode!=\"idle\"}[5m])) * 100"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          # B: Reduce to last value
          - refId: B
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expression: A
              reducer: last
              refId: B
              type: reduce
          # C: Threshold check > 80%
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expression: "$B > 80"
              refId: C
              type: threshold
