# Example LibraryPanel resource - Simple Table Panel
---
apiVersion: oss.gf.m.crossplane.io/v1alpha1
kind: LibraryPanel
metadata:
  name: example-table-panel
  namespace: default
spec:
  providerConfigRef:
    name: grafana-basic-auth
    kind: ProviderConfig
  forProvider:
    name: "Example Table Panel (Crossplane)"
    folderUid: "general"
    modelJson: |
      {
        "datasource": {
          "type": "prometheus",
          "uid": "${DS_PROMETHEUS}"
        },
        "description": "A simple table panel created by Crossplane",
        "fieldConfig": {
          "defaults": {
            "color": {
              "mode": "thresholds"
            },
            "custom": {
              "align": "auto",
              "cellOptions": {
                "type": "auto"
              },
              "filterable": false,
              "inspect": false
            },
            "mappings": [],
            "thresholds": {
              "mode": "absolute",
              "steps": [
                {
                  "color": "green",
                  "value": null
                },
                {
                  "color": "red",
                  "value": 80
                }
              ]
            }
          },
          "overrides": []
        },
        "gridPos": {
          "h": 8,
          "w": 12,
          "x": 0,
          "y": 0
        },
        "options": {
          "cellHeight": "sm",
          "footer": {
            "countRows": false,
            "fields": "",
            "reducer": ["sum"],
            "show": false
          },
          "showHeader": true
        },
        "targets": [
          {
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "editorMode": "code",
            "expr": "up",
            "format": "table",
            "instant": true,
            "refId": "A"
          }
        ],
        "title": "Service Status",
        "type": "table"
      }

# Example LibraryPanel resource - Stat Panel with preset UID
---
apiVersion: oss.gf.m.crossplane.io/v1alpha1
kind: LibraryPanel
metadata:
  name: example-stat-panel
  namespace: default
spec:
  providerConfigRef:
    name: grafana-basic-auth
    kind: ProviderConfig
  forProvider:
    name: "Request Rate Panel (Crossplane)"
    uid: crossplane-stat-panel
    folderUid: "general"
    modelJson: |
      {
        "datasource": {
          "type": "prometheus",
          "uid": "${DS_PROMETHEUS}"
        },
        "description": "Shows the current request rate",
        "fieldConfig": {
          "defaults": {
            "color": {
              "mode": "palette-classic"
            },
            "mappings": [],
            "thresholds": {
              "mode": "absolute",
              "steps": [
                {
                  "color": "green",
                  "value": null
                }
              ]
            },
            "unit": "reqps"
          },
          "overrides": []
        },
        "gridPos": {
          "h": 4,
          "w": 6,
          "x": 0,
          "y": 0
        },
        "options": {
          "colorMode": "value",
          "graphMode": "area",
          "justifyMode": "auto",
          "orientation": "auto",
          "reduceOptions": {
            "calcs": ["lastNotNull"],
            "fields": "",
            "values": false
          },
          "textMode": "auto"
        },
        "targets": [
          {
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "editorMode": "code",
            "expr": "sum(rate(http_requests_total[5m]))",
            "instant": true,
            "refId": "A"
          }
        ],
        "title": "Request Rate",
        "type": "stat"
      }

# Example LibraryPanel resource - Timeseries Panel
---
apiVersion: oss.gf.m.crossplane.io/v1alpha1
kind: LibraryPanel
metadata:
  name: example-timeseries-panel
  namespace: default
spec:
  providerConfigRef:
    name: grafana-token-auth
    kind: ProviderConfig
  forProvider:
    name: "CPU Usage Graph (Crossplane)"
    modelJson: |
      {
        "datasource": {
          "type": "prometheus",
          "uid": "${DS_PROMETHEUS}"
        },
        "description": "CPU usage over time",
        "fieldConfig": {
          "defaults": {
            "color": {
              "mode": "palette-classic"
            },
            "custom": {
              "axisBorderShow": false,
              "axisCenteredZero": false,
              "axisColorMode": "text",
              "axisLabel": "",
              "axisPlacement": "auto",
              "barAlignment": 0,
              "drawStyle": "line",
              "fillOpacity": 10,
              "gradientMode": "none",
              "hideFrom": {
                "legend": false,
                "tooltip": false,
                "viz": false
              },
              "lineInterpolation": "linear",
              "lineWidth": 1,
              "pointSize": 5,
              "scaleDistribution": {
                "type": "linear"
              },
              "showPoints": "auto",
              "spanNulls": false,
              "stacking": {
                "group": "A",
                "mode": "none"
              },
              "thresholdsStyle": {
                "mode": "off"
              }
            },
            "mappings": [],
            "thresholds": {
              "mode": "absolute",
              "steps": [
                {
                  "color": "green",
                  "value": null
                }
              ]
            },
            "unit": "percentunit"
          },
          "overrides": []
        },
        "gridPos": {
          "h": 8,
          "w": 12,
          "x": 0,
          "y": 0
        },
        "options": {
          "legend": {
            "calcs": [],
            "displayMode": "list",
            "placement": "bottom",
            "showLegend": true
          },
          "tooltip": {
            "mode": "single",
            "sort": "none"
          }
        },
        "targets": [
          {
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "editorMode": "code",
            "expr": "avg(rate(process_cpu_seconds_total[5m]))",
            "legendFormat": "CPU Usage",
            "range": true,
            "refId": "A"
          }
        ],
        "title": "CPU Usage",
        "type": "timeseries"
      }
