    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DataSource is the Schema for the DataSource API.
          A DataSource represents a Grafana data source that can be used in dashboards.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DataSourceSpec defines the desired state of a DataSource.
            properties:
              forProvider:
                description: DataSourceParameters are the configurable fields of a
                  DataSource.
                properties:
                  accessMode:
                    default: proxy
                    description: |-
                      AccessMode controls how requests to the data source will be handled.
                      'proxy' means the data source request will be routed through the Grafana backend/server.
                      'direct' means the data source request will be sent directly from the browser.
                      Defaults to 'proxy'.
                    enum:
                    - proxy
                    - direct
                    type: string
                  basicAuthEnabled:
                    description: |-
                      BasicAuthEnabled enables basic authentication for the data source.
                      Defaults to false.
                    type: boolean
                  basicAuthUsername:
                    description: BasicAuthUsername is the username for basic authentication.
                    type: string
                  databaseName:
                    description: DatabaseName is the name of the database to use on
                      the data source server.
                    type: string
                  httpHeadersSecretRef:
                    description: |-
                      HTTPHeadersSecretRef is a reference to a secret containing custom HTTP headers.
                      The secret should contain key-value pairs where keys are header names.
                    properties:
                      key:
                        description: The key to select.
                        type: string
                      name:
                        description: Name of the secret.
                        type: string
                      namespace:
                        description: Namespace of the secret.
                        type: string
