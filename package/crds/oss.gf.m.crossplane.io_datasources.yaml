                description: DataSourceObservation are the observable fields of a
                  DataSource.
                properties:
                  accessMode:
                    description: AccessMode is the access mode of the data source.
                    type: string
                  basicAuthEnabled:
                    description: BasicAuthEnabled indicates if basic auth is enabled.
                    type: boolean
                  id:
                    description: ID is the numeric ID of the data source in Grafana.
                    format: int64
                    type: integer
                  isDefault:
                    description: IsDefault indicates if this is the default data source.
                    type: boolean
                  name:
                    description: Name is the name of the data source.
                    type: string
                  orgId:
                    description: OrgID is the Organization ID.
                    format: int64
                    type: integer
                  readOnly:
                    description: ReadOnly indicates if the data source is read-only.
