                    - key
                    - name
                    - namespace
                    type: object
                  isDefault:
                    description: |-
                      IsDefault sets the data source as the default data source.
                      Defaults to false.
                    type: boolean
                  jsonDataEncoded:
                    description: JSONDataEncoded is a JSON-encoded string containing
                      the data source configuration.
                    type: string
                  name:
                    description: Name is a unique name for the data source.
                    type: string
                  orgId:
                    description: |-
                      OrgID is the Organization ID. If not set, the Org ID defined in the
                      provider config will be used.
